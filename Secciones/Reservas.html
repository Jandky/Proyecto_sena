</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="flex-grow-1 d-flex justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../Comidas Rapidas.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link btn-pide-aqui" href="../Secciones/Menu.html">Menú</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Reservas.html">Reservas</a></li>
                    <li class="nav-item"><a class="nav-link promo-link" href="../Secciones/Galerias.html">Galería</a>
                    </li>

                    </li>
                </ul>

            <div class="d-flex align-items-center">
                <form class="d-flex me-2" role="search">
                    <input class="form-control buscador" type="search" placeholder="Buscar..." aria-label="Buscar">
                    <button class="btn btn-search" type="submit"><i class="bi bi-search"></i></button>
                </form>
                <a href="#" class="icon-link"><i class="bi bi-person"></i></a>

                </a>

    <h1 class="text-center my-4">Reserva tu mesa</h1>

    <div class="container mb-5">
        <form class="mx-auto" style="max-width: 600px;">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" id="nombre" placeholder="Tu nombre completo" required />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required />
            </div>
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="tel" class="form-control" id="telefono" placeholder="Número de teléfono" required />
            </div>
            <div class="mb-3 row">
                <div class="col">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" class="form-control" id="fecha" required />
                </div>
                <div class="col">
                    <label for="hora" class="form-label">Hora</label>
                    <input type="time" class="form-control" id="hora" required />
                </div>
            </div>
            <div class="mb-3">
                <label for="personas" class="form-label">Número de Personas</label>
                <input type="number" class="form-control" id="personas" min="1" max="20" value="2" required />
            </div>
            <button type="submit" class="btn btn-pide-aqui w-100">Reservar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-0kNc7S5kQJvSQkoYa6jkZbbGBsFg8Zn5zZC+8LqgeboKF6L2Uv6bO0bb9Dfj3D/l"
        crossorigin="anonymous"></script>
</body>

</html>
